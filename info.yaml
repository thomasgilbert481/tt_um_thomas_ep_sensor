# Tiny Tapeout project information
project:
  title:        "EP Sensor (chiral exceptional point at 2.7 GHz)"
  author:       "Thomas Gilbert"
  discord:      ""
  description:  "Zhao chiral-coupled LC tank pair with on-chip 130x130 um spirals (1.351 nH each, Q~15) and an 8-bit cv-array; produces frequency-splitting that follows sqrt(eps) scaling characteristic of an exceptional-point sensor."
  language:     "Analog"
  clock_hz:     0

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "2x2"

  # How many analog pins does your project use?
  # ua[0] = V1 tank node (RF probe in).  ua[1] = V2 buffered output (peak-split).
  # ua[2..7] are unused; the chip has no metal at those pin sites.
  analog_pins: 2
  uses_3v3: false

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_thomas_ep_sensor"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs - cv-array perturbation switch controls (b0..b7)
  ui[0]: "b0 (cv-array LSB; 20 fF)"
  ui[1]: "b1 (40 fF)"
  ui[2]: "b2 (80 fF)"
  ui[3]: "b3 (160 fF)"
  ui[4]: "b4 (320 fF)"
  ui[5]: "b5 (640 fF)"
  ui[6]: "b6 (1280 fF)"
  ui[7]: "b7 (cv-array MSB; 1280 fF)"

  # Outputs (unused, tied low)
  uo[0]: ""
  uo[1]: ""
  uo[2]: ""
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins - make sure to also set "analog_pins" above, else the pins won't be connected
  ua[0]: "V1 (V1 LC tank node; RF probe drive, 50 ohm coupled)"
  ua[1]: "V2 (V2 LC tank node, buffered output; observe peak split)"
  ua[2]: ""
  ua[3]: ""
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
